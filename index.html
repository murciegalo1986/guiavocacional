<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>¿Qué estudiar? — Orientador Vocacional Chile</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,200;0,9..144,400;0,9..144,700;1,9..144,300;1,9..144,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #13161e;
    --card: #191d27;
    --border: #252a36;
    --border-light: #2e3547;
    --text: #e8eaf0;
    --muted: #7a829a;
    --dim: #4a5168;
    --accent: #f0a500;
    --accent2: #e05c3a;
    --green: #3ecf8e;
    --blue: #4d9de0;
    --purple: #9b72cf;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* BACKGROUND TEXTURE */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse 80% 50% at 20% 10%, rgba(240,165,0,0.04) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 80%, rgba(77,157,224,0.04) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 0 24px;
    position: relative;
    z-index: 1;
  }

  /* HEADER */
  header {
    padding: 64px 0 48px;
    text-align: center;
  }

  .header-tag {
    display: inline-block;
    background: rgba(240,165,0,0.12);
    color: var(--accent);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 6px 16px;
    border-radius: 100px;
    border: 1px solid rgba(240,165,0,0.2);
    margin-bottom: 28px;
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-size: clamp(42px, 7vw, 72px);
    font-weight: 700;
    line-height: 1.05;
    letter-spacing: -0.02em;
    margin-bottom: 20px;
    color: #fff;
  }

  h1 em {
    font-style: italic;
    font-weight: 300;
    color: var(--accent);
  }

  .subtitle {
    color: var(--muted);
    font-size: 16px;
    max-width: 460px;
    margin: 0 auto;
    line-height: 1.7;
  }

  /* QUIZ WRAPPER */
  #quiz-wrapper {
    padding-bottom: 80px;
  }

  /* PROGRESS */
  .progress-bar-wrap {
    height: 2px;
    background: var(--border);
    border-radius: 2px;
    margin-bottom: 40px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .progress-label {
    text-align: right;
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  /* QUESTION CARD */
  .question-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px;
    margin-bottom: 20px;
    animation: fadeUp 0.4s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .q-number {
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    font-weight: 500;
    margin-bottom: 12px;
  }

  .q-text {
    font-family: 'Fraunces', serif;
    font-size: clamp(20px, 3vw, 26px);
    font-weight: 400;
    color: #fff;
    line-height: 1.35;
    margin-bottom: 8px;
  }

  .q-sub {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 28px;
  }

  /* OPTIONS GRID */
  .options-grid {
    display: grid;
    gap: 10px;
  }

  .options-grid.cols-2 {
    grid-template-columns: 1fr 1fr;
  }

  .option-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    cursor: pointer;
    text-align: left;
    transition: all 0.2s ease;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    position: relative;
    overflow: hidden;
  }

  .option-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(240,165,0,0.06), transparent);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .option-btn:hover::before { opacity: 1; }

  .option-btn:hover {
    border-color: var(--border-light);
    transform: translateY(-1px);
  }

  .option-btn.selected {
    border-color: var(--accent);
    background: rgba(240,165,0,0.08);
  }

  .option-btn.selected::before { opacity: 1; }

  .option-emoji {
    font-size: 20px;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .option-label {
    font-weight: 500;
    color: #fff;
    margin-bottom: 2px;
  }

  .option-desc {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
  }

  /* SLIDER QUESTION */
  .slider-wrap {
    padding: 8px 0 20px;
  }

  .slider-labels {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 12px;
  }

  input[type=range] {
    width: 100%;
    -webkit-appearance: none;
    height: 4px;
    background: var(--border);
    border-radius: 4px;
    outline: none;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 22px;
    height: 22px;
    background: var(--accent);
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 0 0 4px rgba(240,165,0,0.15);
    transition: box-shadow 0.2s;
  }

  input[type=range]::-webkit-slider-thumb:hover {
    box-shadow: 0 0 0 8px rgba(240,165,0,0.2);
  }

  .slider-value {
    text-align: center;
    font-family: 'Fraunces', serif;
    font-size: 32px;
    color: var(--accent);
    margin-top: 16px;
    font-weight: 700;
  }

  /* NAV BUTTONS */
  .nav-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 32px;
    gap: 12px;
  }

  .btn-back {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 12px 24px;
    border-radius: 10px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    transition: all 0.2s;
  }

  .btn-back:hover {
    border-color: var(--border-light);
    color: var(--text);
  }

  .btn-next {
    background: var(--accent);
    color: #000;
    border: none;
    padding: 14px 32px;
    border-radius: 10px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    transition: all 0.2s;
    margin-left: auto;
  }

  .btn-next:hover {
    background: #ffb820;
    transform: translateY(-1px);
  }

  .btn-next:disabled {
    background: var(--border);
    color: var(--dim);
    cursor: not-allowed;
    transform: none;
  }

  /* LOADING */
  #loading-screen {
    text-align: center;
    padding: 80px 20px;
    animation: fadeUp 0.4s ease both;
  }

  .spinner {
    width: 48px;
    height: 48px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 24px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    color: var(--text);
    margin-bottom: 8px;
  }

  .loading-sub {
    font-size: 13px;
    color: var(--muted);
  }

  /* RESULTS */
  #results-screen {
    animation: fadeUp 0.5s ease both;
  }

  .results-header {
    text-align: center;
    padding: 20px 0 48px;
  }

  .results-emoji {
    font-size: 48px;
    margin-bottom: 16px;
  }

  .results-title {
    font-family: 'Fraunces', serif;
    font-size: clamp(28px, 5vw, 42px);
    font-weight: 700;
    color: #fff;
    margin-bottom: 12px;
    line-height: 1.2;
  }

  .results-subtitle {
    color: var(--muted);
    font-size: 15px;
    max-width: 500px;
    margin: 0 auto;
  }

  /* TRACK SECTIONS */
  .track-section {
    margin-bottom: 32px;
  }

  .track-label {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }

  .track-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .track-name {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .track-badge {
    font-size: 10px;
    padding: 3px 10px;
    border-radius: 100px;
    font-weight: 500;
    letter-spacing: 0.05em;
  }

  /* RESULT CARDS */
  .result-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px 28px;
    margin-bottom: 12px;
    transition: border-color 0.2s;
    position: relative;
    overflow: hidden;
  }

  .result-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    border-radius: 3px 0 0 3px;
  }

  .result-card:hover {
    border-color: var(--border-light);
  }

  .result-card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 16px;
    margin-bottom: 10px;
  }

  .result-name {
    font-weight: 600;
    font-size: 16px;
    color: #fff;
    line-height: 1.3;
  }

  .result-match {
    font-size: 12px;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 100px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .result-desc {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.65;
    margin-bottom: 14px;
  }

  .result-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .meta-chip {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 6px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
  }

  .result-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--accent);
    text-decoration: none;
    margin-top: 12px;
    font-weight: 500;
    transition: gap 0.2s;
  }

  .result-link:hover { gap: 10px; }

  /* COLOR THEMES PER TRACK */
  .track-uni .track-dot { background: var(--blue); }
  .track-uni .track-badge { background: rgba(77,157,224,0.12); color: var(--blue); border: 1px solid rgba(77,157,224,0.2); }
  .track-uni .result-card::before { background: var(--blue); }
  .track-uni .result-match { background: rgba(77,157,224,0.12); color: var(--blue); }

  .track-tec .track-dot { background: var(--green); }
  .track-tec .track-badge { background: rgba(62,207,142,0.12); color: var(--green); border: 1px solid rgba(62,207,142,0.2); }
  .track-tec .result-card::before { background: var(--green); }
  .track-tec .result-match { background: rgba(62,207,142,0.12); color: var(--green); }

  .track-online .track-dot { background: var(--purple); }
  .track-online .track-badge { background: rgba(155,114,207,0.12); color: var(--purple); border: 1px solid rgba(155,114,207,0.2); }
  .track-online .result-card::before { background: var(--purple); }
  .track-online .result-match { background: rgba(155,114,207,0.12); color: var(--purple); }

  .track-free .track-dot { background: var(--accent); }
  .track-free .track-badge { background: rgba(240,165,0,0.12); color: var(--accent); border: 1px solid rgba(240,165,0,0.2); }
  .track-free .result-card::before { background: var(--accent); }
  .track-free .result-match { background: rgba(240,165,0,0.12); color: var(--accent); }

  .track-gov .track-dot { background: var(--accent2); }
  .track-gov .track-badge { background: rgba(224,92,58,0.12); color: var(--accent2); border: 1px solid rgba(224,92,58,0.2); }
  .track-gov .result-card::before { background: var(--accent2); }
  .track-gov .result-match { background: rgba(224,92,58,0.12); color: var(--accent2); }

  /* DISCLAIMER */
  .disclaimer {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
    margin-top: 40px;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.7;
    text-align: center;
  }

  .btn-restart {
    display: block;
    margin: 32px auto 0;
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 12px 32px;
    border-radius: 10px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    transition: all 0.2s;
  }

  .btn-restart:hover {
    border-color: var(--border-light);
    color: var(--text);
  }

  /* ERROR */
  .error-box {
    background: rgba(224,92,58,0.1);
    border: 1px solid rgba(224,92,58,0.3);
    border-radius: 12px;
    padding: 20px 24px;
    color: #f08070;
    font-size: 14px;
    margin-top: 20px;
  }

  /* HIDDEN */
  .hidden { display: none !important; }

  @media (max-width: 600px) {
    .options-grid.cols-2 { grid-template-columns: 1fr; }
    .question-card { padding: 28px 20px; }
    header { padding: 40px 0 32px; }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="header-tag">🇨🇱 Orientador Vocacional Chile</div>
    <h1>¿Qué deberías<br><em>estudiar</em>?</h1>
    <p class="subtitle">Responde 8 preguntas y descubre tu camino real — desde una carrera universitaria hasta un curso gratuito del Estado.</p>
  </header>

  <div id="quiz-wrapper">
    <!-- STEP INDICATOR -->
    <div id="progress-wrap" class="hidden">
      <div class="progress-label" id="progress-label">Pregunta 1 de 8</div>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="progress-bar" style="width:0%"></div>
      </div>
    </div>

    <!-- QUIZ SCREEN -->
    <div id="quiz-screen"></div>

    <!-- LOADING -->
    <div id="loading-screen" class="hidden">
      <div class="spinner"></div>
      <div class="loading-text">Analizando tu perfil…</div>
      <div class="loading-sub">Buscando los mejores caminos para ti en Chile</div>
    </div>

    <!-- RESULTS -->
    <div id="results-screen" class="hidden"></div>
  </div>
</div>

<script>
const QUESTIONS = [
  {
    id: 'tiempo',
    text: '¿Cuánto tiempo tienes disponible para estudiar?',
    sub: 'Sin presión, lo importante es ser honesto/a.',
    type: 'options',
    options: [
      { emoji: '⚡', label: 'Quiero resultados rápido', desc: 'Menos de 1 año', value: 'rapido' },
      { emoji: '📅', label: '1 a 2 años', desc: 'Formación técnica o cursos', value: 'medio' },
      { emoji: '🎓', label: '3 a 5 años', desc: 'Carrera larga, lo vale', value: 'largo' },
      { emoji: '🤷', label: 'No lo sé aún', desc: 'Necesito explorar primero', value: 'indefinido' },
    ]
  },
  {
    id: 'dinero',
    text: '¿Cómo es tu situación económica para estudiar?',
    sub: 'Solo para orientar las recomendaciones.',
    type: 'options',
    cols: 2,
    options: [
      { emoji: '💸', label: 'Sin recursos ahora', desc: 'Solo opciones gratuitas', value: 'cero' },
      { emoji: '🟡', label: 'Poco presupuesto', desc: 'Algo puedo invertir', value: 'poco' },
      { emoji: '🟢', label: 'Puedo financiarme', desc: 'Con crédito o ahorros', value: 'medio' },
      { emoji: '💼', label: 'Tengo respaldo', desc: 'No es un problema', value: 'alto' },
    ]
  },
  {
    id: 'situacion',
    text: '¿Cuál es tu situación actual?',
    sub: 'Esto cambia mucho las opciones disponibles.',
    type: 'options',
    options: [
      { emoji: '🏫', label: 'Estoy en 4° medio', desc: 'Próximamente egresado/a', value: '4medio' },
      { emoji: '📜', label: 'Ya egresé del colegio', desc: 'Sin estudios superiores aún', value: 'egresado' },
      { emoji: '💼', label: 'Estoy trabajando', desc: 'Quiero estudiar y trabajar', value: 'trabajando' },
      { emoji: '🔄', label: 'Cambio de carrera', desc: 'Tengo estudios previos', value: 'cambio' },
    ]
  },
  {
    id: 'actitud',
    text: '¿Cómo describirías tu forma de aprender?',
    sub: 'No hay respuesta correcta, solo tu estilo.',
    type: 'options',
    cols: 2,
    options: [
      { emoji: '🛠️', label: 'Aprender haciendo', desc: 'Práctico, con las manos', value: 'practico' },
      { emoji: '📚', label: 'Profundidad teórica', desc: 'Me gusta entender el por qué', value: 'teorico' },
      { emoji: '🤝', label: 'En equipo', desc: 'Ambiente social me motiva', value: 'social' },
      { emoji: '💻', label: 'A mi ritmo', desc: 'Online, flexible, autodidacta', value: 'autodidacta' },
    ]
  },
  {
    id: 'area',
    text: '¿Hacia qué área te inclinas más?',
    sub: 'Elige la que más te llama, aunque no estés seguro/a.',
    type: 'options',
    cols: 2,
    options: [
      { emoji: '💻', label: 'Tecnología y datos', desc: 'Programación, IA, sistemas', value: 'tech' },
      { emoji: '🏥', label: 'Salud y bienestar', desc: 'Medicina, enfermería, nutrición', value: 'salud' },
      { emoji: '🎨', label: 'Creatividad y diseño', desc: 'Arte, comunicación, UX', value: 'creativo' },
      { emoji: '📊', label: 'Negocios y gestión', desc: 'Administración, ventas, finanzas', value: 'negocios' },
      { emoji: '⚙️', label: 'Industria y obras', desc: 'Ingeniería, construcción', value: 'industria' },
      { emoji: '🌿', label: 'Medio ambiente', desc: 'Agronomía, recursos naturales', value: 'ambiente' },
    ]
  },
  {
    id: 'meta',
    text: '¿Cuál es tu objetivo principal?',
    sub: 'Lo que más te importa lograr.',
    type: 'options',
    options: [
      { emoji: '💰', label: 'Ganar buen sueldo rápido', desc: 'Necesito ingresos pronto', value: 'sueldo' },
      { emoji: '🚀', label: 'Emprender algo propio', desc: 'Quiero crear mi propio negocio', value: 'emprender' },
      { emoji: '🌎', label: 'Trabajar en el extranjero', desc: 'Una carrera con proyección global', value: 'exterior' },
      { emoji: '❤️', label: 'Hacer algo con propósito', desc: 'Impacto social, lo que me apasiona', value: 'proposito' },
    ]
  },
  {
    id: 'modalidad',
    text: '¿Qué modalidad de estudio prefieres?',
    sub: 'O la que se adapta mejor a tu vida.',
    type: 'options',
    cols: 2,
    options: [
      { emoji: '🏛️', label: 'Presencial', desc: 'Campus, vida universitaria', value: 'presencial' },
      { emoji: '🖥️', label: 'Online', desc: 'Desde casa, flexible', value: 'online' },
      { emoji: '🔀', label: 'Híbrido', desc: 'Mezcla de ambos', value: 'hibrido' },
      { emoji: '🌙', label: 'Vespertino/nocturno', desc: 'Estudiar después del trabajo', value: 'vespertino' },
    ]
  },
  {
    id: 'nem',
    text: '¿Cómo fue tu rendimiento académico en el colegio?',
    sub: 'Solo aplica si vas a postular a carreras universitarias.',
    type: 'options',
    cols: 2,
    options: [
      { emoji: '⭐', label: 'Muy bueno', desc: 'NEM alto, buen puntaje PAES', value: 'alto' },
      { emoji: '📘', label: 'Regular', desc: 'Notas normales, podría mejorar', value: 'regular' },
      { emoji: '📉', label: 'Bajo', desc: 'No fue mi mejor etapa', value: 'bajo' },
      { emoji: '🚫', label: 'No aplica', desc: 'Ya tengo estudios previos', value: 'na' },
    ]
  },
];

let currentStep = 0;
let answers = {};

function init() {
  showQuestion(0);
  document.getElementById('progress-wrap').classList.remove('hidden');
}

function showQuestion(idx) {
  const q = QUESTIONS[idx];
  const total = QUESTIONS.length;
  
  document.getElementById('progress-label').textContent = `Pregunta ${idx + 1} de ${total}`;
  document.getElementById('progress-bar').style.width = `${((idx) / total) * 100}%`;

  const screen = document.getElementById('quiz-screen');
  screen.innerHTML = '';
  
  const card = document.createElement('div');
  card.className = 'question-card';
  
  let optionsHTML = '';
  if (q.type === 'options') {
    const gridClass = q.cols === 2 ? 'options-grid cols-2' : 'options-grid';
    const opts = q.options.map(opt => `
      <button class="option-btn ${answers[q.id] === opt.value ? 'selected' : ''}" 
              onclick="selectOption('${q.id}', '${opt.value}', this)">
        <span class="option-emoji">${opt.emoji}</span>
        <span>
          <div class="option-label">${opt.label}</div>
          <div class="option-desc">${opt.desc}</div>
        </span>
      </button>
    `).join('');
    optionsHTML = `<div class="${gridClass}">${opts}</div>`;
  }

  card.innerHTML = `
    <div class="q-number">Pregunta ${idx + 1}</div>
    <div class="q-text">${q.text}</div>
    <div class="q-sub">${q.sub}</div>
    ${optionsHTML}
  `;

  screen.appendChild(card);

  const nav = document.createElement('div');
  nav.className = 'nav-row';
  nav.innerHTML = `
    ${idx > 0 ? `<button class="btn-back" onclick="goBack()">← Atrás</button>` : '<span></span>'}
    <button class="btn-next" id="btn-next" onclick="goNext()" ${!answers[q.id] ? 'disabled' : ''}>
      ${idx === total - 1 ? 'Ver mis resultados →' : 'Siguiente →'}
    </button>
  `;
  screen.appendChild(nav);
}

function selectOption(qId, value, btn) {
  answers[qId] = value;
  document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  document.getElementById('btn-next').disabled = false;
}

function goNext() {
  if (currentStep < QUESTIONS.length - 1) {
    currentStep++;
    showQuestion(currentStep);
  } else {
    startAnalysis();
  }
}

function goBack() {
  if (currentStep > 0) {
    currentStep--;
    showQuestion(currentStep);
  }
}

function startAnalysis() {
  document.getElementById('quiz-screen').classList.add('hidden');
  document.getElementById('progress-wrap').classList.add('hidden');
  document.getElementById('loading-screen').classList.remove('hidden');
  setTimeout(() => {
    const result = generarRecomendaciones(answers);
    showResults(result);
  }, 1800);
}

function generarRecomendaciones(a) {
  const area = a.area || 'tech';
  const dinero = a.dinero || 'poco';
  const tiempo = a.tiempo || 'medio';
  const situacion = a.situacion || 'egresado';
  const meta = a.meta || 'sueldo';
  const actitud = a.actitud || 'practico';
  const modalidad = a.modalidad || 'hibrido';
  const nem = a.nem || 'regular';

  // ─ Resumen de perfil
  const areaLabels = { tech: 'tecnología', salud: 'salud', creativo: 'diseño y creatividad', negocios: 'negocios', industria: 'industria y obras', ambiente: 'medio ambiente' };
  const metaLabels = { sueldo: 'conseguir buenos ingresos rápidamente', emprender: 'emprender su propio negocio', exterior: 'trabajar en el extranjero', proposito: 'generar impacto social' };
  const perfil_resumen = `Perfil orientado hacia ${areaLabels[area]}, con motivación principal de ${metaLabels[meta]}. ${dinero === 'cero' ? 'Su situación económica actual requiere priorizar opciones gratuitas o con becas del Estado.' : dinero === 'poco' ? 'Puede acceder a opciones con apoyo estatal como CAE o becas.' : 'Tiene flexibilidad económica para explorar distintas modalidades.'}`;

  // ─ Camino recomendado
  let camino_recomendado = 'Carrera Técnica + Cursos Online';
  if (tiempo === 'largo' && nem === 'alto') camino_recomendado = 'Universidad + Becas del Estado';
  else if (tiempo === 'rapido' || dinero === 'cero') camino_recomendado = 'Cursos Gratuitos + Programas SENCE';
  else if (actitud === 'autodidacta' || modalidad === 'online') camino_recomendado = 'Cursos Online + Técnico Profesional';
  else if (meta === 'emprender') camino_recomendado = 'Cursos Pagados + Programas Corfo/ChileEmprende';

  // ─ Seleccionar items por área
  const uniItems = DB.universidad[area] || DB.universidad.tech;
  const tecItems = DB.tecnico[area] || DB.tecnico.tech;
  const pagoItems = DB.curso_pago[area] || DB.curso_pago.tech;
  const gratisItems = DB.curso_gratis[area] || DB.curso_gratis.tech;

  // Gobierno depende del dinero
  const govKey = ['cero','poco'].includes(dinero) ? dinero : (dinero === 'medio' ? 'medio' : 'alto');
  const govItems = DB.gobierno[govKey] || DB.gobierno.cero;

  // ─ Calcular match scores
  function matchScore(tipo) {
    let score = 'Medio';
    if (tipo === 'universidad' && tiempo === 'largo' && nem !== 'bajo') score = 'Alto';
    if (tipo === 'universidad' && (tiempo === 'rapido' || dinero === 'cero')) score = 'Bajo';
    if (tipo === 'tecnico' && ['medio','rapido'].includes(tiempo)) score = 'Alto';
    if (tipo === 'tecnico' && actitud === 'practico') score = 'Alto';
    if (tipo === 'curso_pago' && actitud === 'autodidacta') score = 'Alto';
    if (tipo === 'curso_pago' && dinero === 'cero') score = 'Bajo';
    if (tipo === 'curso_gratis' && dinero === 'cero') score = 'Alto';
    if (tipo === 'curso_gratis' && actitud === 'autodidacta') score = 'Alto';
    if (tipo === 'gobierno' && ['cero','poco'].includes(dinero)) score = 'Alto';
    return score;
  }

  const uniMatch = matchScore('universidad');
  const tecMatch = matchScore('tecnico');
  const pagoMatch = matchScore('curso_pago');
  const gratisMatch = matchScore('curso_gratis');
  const govMatch = matchScore('gobierno');

  return {
    perfil_resumen,
    camino_recomendado,
    tracks: [
      {
        tipo: 'universidad',
        titulo: 'Carreras Universitarias',
        items: uniItems.slice(0,2).map(i => ({ ...i, match: uniMatch }))
      },
      {
        tipo: 'tecnico',
        titulo: 'Técnico Profesional',
        items: tecItems.slice(0,2).map(i => ({ ...i, match: tecMatch }))
      },
      {
        tipo: 'curso_pago',
        titulo: 'Cursos Online de Pago',
        items: pagoItems.slice(0,2).map(i => ({ ...i, match: pagoMatch }))
      },
      {
        tipo: 'curso_gratis',
        titulo: 'Cursos Gratuitos',
        items: gratisItems.slice(0,2).map(i => ({ ...i, match: gratisMatch }))
      },
      {
        tipo: 'gobierno',
        titulo: 'Programas Gubernamentales',
        items: govItems.slice(0,2).map(i => ({ ...i, match: govMatch }))
      },
    ]
  };
}

function showResults(data) {
  document.getElementById('loading-screen').classList.add('hidden');
  
  const trackConfig = {
    universidad: { clase: 'track-uni', icon: '🎓', label: 'Universidades' },
    tecnico: { clase: 'track-tec', icon: '⚙️', label: 'Técnico Profesional' },
    curso_pago: { clase: 'track-online', icon: '💻', label: 'Cursos Pagados Online' },
    curso_gratis: { clase: 'track-free', icon: '🆓', label: 'Cursos Gratuitos' },
    gobierno: { clase: 'track-gov', icon: '🇨🇱', label: 'Programas Gubernamentales' },
  };

  let tracksHTML = '';
  for (const track of data.tracks) {
    const cfg = trackConfig[track.tipo] || { clase: 'track-free', icon: '📌', label: track.titulo };
    const itemsHTML = track.items.map(item => `
      <div class="result-card">
        <div class="result-card-top">
          <div class="result-name">${item.nombre}</div>
          <div class="result-match">${item.match} match</div>
        </div>
        <div class="result-desc">${item.descripcion}</div>
        <div class="result-meta">
          ${item.chips.map(c => `<span class="meta-chip">${c}</span>`).join('')}
          ${item.duracion ? `<span class="meta-chip">⏱ ${item.duracion}</span>` : ''}
          ${item.costo ? `<span class="meta-chip">💰 ${item.costo}</span>` : ''}
        </div>
        ${item.link ? `<a class="result-link" href="${item.link}" target="_blank" rel="noopener">${cfg.icon} Ver más →</a>` : ''}
      </div>
    `).join('');

    tracksHTML += `
      <div class="track-section ${cfg.clase}">
        <div class="track-label">
          <div class="track-dot"></div>
          <div class="track-name">${cfg.icon} ${cfg.label}</div>
          <span class="track-badge">${track.items.length} opciones</span>
        </div>
        ${itemsHTML}
      </div>
    `;
  }

  const screen = document.getElementById('results-screen');
  screen.innerHTML = `
    <div class="results-header">
      <div class="results-emoji">✨</div>
      <div class="results-title">Tu mapa de caminos</div>
      <div class="results-subtitle">${data.perfil_resumen}</div>
    </div>
    ${tracksHTML}
    <div class="disclaimer">
      Esta orientación es un punto de partida basado en tu perfil. Te recomendamos verificar directamente con las instituciones la disponibilidad, requisitos actualizados y fechas de postulación.
    </div>
    <button class="btn-restart" onclick="restartQuiz()">↺ Volver a empezar</button>
  `;
  screen.classList.remove('hidden');
}

function restartQuiz() {
  currentStep = 0;
  answers = {};
  document.getElementById('results-screen').classList.add('hidden');
  document.getElementById('loading-screen').classList.add('hidden');
  document.getElementById('quiz-screen').classList.remove('hidden');
  document.getElementById('progress-wrap').classList.remove('hidden');
  showQuestion(0);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
